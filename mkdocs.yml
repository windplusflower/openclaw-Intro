site_name: OpenClaw 科普扫盲文档
site_description: 从零基础到独立使用 OpenClaw 构建 AI 工作流
site_author: windflower
repo_url: https://github.com/windplusflower/openclaw-docs
repo_name: windplusflower/openclaw-docs

theme:
  name: material
  language: zh
  features:
    - navigation.expand
    - navigation.sections
    - search
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tooltips
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式

markdown_extensions:
  - admonition
  - codehilite
  - footnotes
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.highlight
  - pymdownx.tabbed

nav:
  - 首页：docs/index.md
  - AI 入门:
    - docs/01-ai-intro/01-how-ai-works.md
    - docs/01-ai-intro/02-token-concept.md
    - docs/01-ai-intro/03-ai-hallucination.md
    - docs/01-ai-intro/04-terminal-intro.md
    - docs/01-ai-intro/05-common-commands.md
    - docs/01-ai-intro/06-file-paths.md
    - docs/01-ai-intro/07-code-basics.md
  - OpenClaw 指南:
    - docs/02-openclaw-guide/01-what-is-openclaw.md
    - docs/02-openclaw-guide/02-install-macos.md
    - docs/02-openclaw-guide/03-install-windows.md
    - docs/02-openclaw-guide/04-session-management.md
    - docs/02-openclaw-guide/05-channel-setup.md
    - docs/02-openclaw-guide/06-skill-system.md
  - 参考:
    - docs/03-reference/command-cheatsheet.md
    - docs/03-reference/config-locations.md
    - docs/03-reference/api-setup.md
    - docs/03-reference/automation-examples.md
    - docs/03-reference/faq.md
    - docs/03-reference/troubleshooting.md
  - 常见问题：docs/04-faq.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/windplusflower/openclaw-docs
