site_name: OpenClaw 零基础教学
site_description: 从零基础到独立使用 OpenClaw 构建 AI 工作流
site_author: windflower
repo_url: https://github.com/windplusflower/Ai-Intro
repo_name: windplusflower/Ai-Intro

theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - search
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tooltips
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式

markdown_extensions:
  - admonition
  - codehilite
  - footnotes
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.highlight
  - pymdownx.tabbed

nav:
  - 首页: README.md
  - 阶段一：AI 原理与终端基础:
    - 01-ai-basics/README.md
    - AI 如何工作：01-ai-basics/01-how-ai-works.md
    - Token 概念：01-ai-basics/02-token-concept.md
    - AI 为什么会胡说：01-ai-basics/03-ai-hallucination.md
    - 终端入门：01-ai-basics/04-terminal-intro.md
    - 常用命令：01-ai-basics/05-common-commands.md
    - 文件路径概念：01-ai-basics/06-file-paths.md
    - 代码是什么：01-ai-basics/07-code-basics.md
  - 阶段二：OpenClaw 核心使用:
    - 02-opencode-core/README.md
    - OpenClaw 是什么：02-opencode-core/01-what-is-opencode.md
    - macOS 安装：02-opencode-core/02-install-macos.md
    - Windows 安装：02-opencode-core/03-install-windows.md
    - 会话管理：02-opencode-core/04-session-management.md
    - 渠道配置：02-opencode-core/05-channel-setup.md
    - 技能系统：02-opencode-core/06-skill-system.md
  - 附录:
    - 命令速查表：03-appendix/command-cheatsheet.md
    - 配置文件位置：03-appendix/config-locations.md
    - API 配置指南：03-appendix/api-setup.md
    - 自动化示例：03-appendix/automation-examples.md
    - 常见问题 FAQ: 03-appendix/faq.md
    - 问题排查指南：03-appendix/troubleshooting.md
  - 课程总结：04-course-summary.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/windplusflower/Ai-Intro
