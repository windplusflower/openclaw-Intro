site_name: OpenClaw 科普扫盲文档
site_description: 零基础了解 OpenClaw 和 AI 助手
site_author: windflower
repo_url: https://github.com/windplusflower/openclaw-Intro
repo_name: windplusflower/openclaw-Intro

theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - search
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tooltips
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式

markdown_extensions:
  - admonition
  - codehilite
  - footnotes
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.highlight
  - pymdownx.tabbed

nav:
  - 首页：README.md
  - 第一部分：AI 入门:
    - 01-ai-intro/README.md
    - AI 如何工作：01-ai-intro/01-how-ai-works.md
    - Token 概念：01-ai-intro/02-token-concept.md
    - AI 为什么会胡说：01-ai-intro/03-ai-hallucination.md
    - 终端入门：01-ai-intro/04-terminal-intro.md
    - 常用命令：01-ai-intro/05-common-commands.md
    - 文件路径概念：01-ai-intro/06-file-paths.md
    - 代码是什么：01-ai-intro/07-code-basics.md
  - 第二部分：OpenClaw 指南:
    - 02-opencode-guide/README.md
    - OpenClaw 是什么：02-opencode-guide/01-what-is-opencode.md
    - macOS 安装：02-opencode-guide/02-install-macos.md
    - Windows 安装：02-opencode-guide/03-install-windows.md
    - 会话管理：02-opencode-guide/04-session-management.md
    - 渠道配置：02-opencode-guide/05-channel-setup.md
    - 技能系统：02-opencode-guide/06-skill-system.md
  - 参考:
    - 命令速查表：03-reference/command-cheatsheet.md
    - 配置文件位置：03-reference/config-locations.md
    - API 配置指南：03-reference/api-setup.md
    - 自动化示例：03-reference/automation-examples.md
    - 常见问题 FAQ: 03-reference/faq.md
    - 问题排查指南：03-reference/troubleshooting.md
  - 常见问题：04-faq.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/windplusflower/openclaw-Intro
